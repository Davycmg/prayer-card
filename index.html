<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>禱告卡片</title>
<style>
  :root {
    --purple: #674ea7;
    --purple-light: #d9d2e9;
    --green: #6aa84f;
    --yellow: #fff2cc;
    --blue: #cfe2f3;
    --gray-bg: #f5f5f7;
    --text-main: #1a1a1a;
    --text-sub: #666666;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--gray-bg);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    padding: 12px 0;
  }
  .header h1 {
    font-size: 20px;
    color: var(--purple);
    margin: 0;
  }
  .progress {
    font-size: 14px;
    color: var(--text-sub);
    margin-top: 4px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 24px 20px;
    margin-top: 12px;
  }
  .prayer-text {
    font-size: 22px;
    line-height: 1.6;
    min-height: 140px;
    white-space: pre-wrap;
    outline: none;
    border: none;
    width: 100%;
    background: transparent;
    font-family: inherit;
    resize: none;
    color: var(--text-main);
  }
  .prayer-text:focus {
    background: #fafafa;
    border-radius: 8px;
  }
  .meta-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .meta-field {
    flex: 1;
    min-width: 130px;
  }
  .meta-field label {
    display: block;
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  .meta-field select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
    background: white;
  }
  .meta-field.cycle select { background: var(--yellow); }
  .meta-field.tag select { background: var(--blue); }
  .note {
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-sub);
    white-space: pre-wrap;
  }
  .add-tag-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .add-tag-row input[type="text"] {
    flex: 1;
    min-width: 100px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }
  .add-tag-checkbox {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .add-tag-checkbox input { width: 16px; height: 16px; }
  .add-tag-row button {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--purple);
    background: white;
    color: var(--purple);
    font-size: 13px;
    white-space: nowrap;
  }
  .copy-tasks-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--purple);
    background: white;
    color: var(--purple);
    font-size: 14px;
    cursor: pointer;
  }
  .copy-tasks-btn:active { opacity: 0.7; }
  .controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    padding: 16px 0;
    border-radius: 12px;
    border: none;
    font-size: 17px;
    font-weight: bold;
    color: white;
    background: var(--purple);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { opacity: 0.7; }
  .btn.secondary { background: var(--green); }
  .btn.complete { background: #2e8b74; }
  .controls.triple {
    gap: 6px;
  }
  .controls.triple .btn {
    font-size: 14px;
    padding: 14px 2px;
  }
  .jump-row {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    justify-content: center;
  }
  .jump-row input {
    width: 70px;
    padding: 8px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
  }
  .jump-row button {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--purple);
    background: white;
    color: var(--purple);
    font-size: 14px;
  }
  .toggle-row {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-sub);
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: .2s;
    border-radius: 24px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background-color: white;
    transition: .2s;
    border-radius: 50%;
  }
  input:checked + .slider { background-color: var(--purple); }
  input:checked + .slider:before { transform: translateX(20px); }
  .status {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-sub);
    height: 16px;
    text-align: center;
  }
  .danger-zone {
    width: 100%;
    max-width: 480px;
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid #e5e5e5;
    display: flex;
    justify-content: center;
  }
  .danger-zone button {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: transparent;
    color: #b0413e;
    font-size: 13px;
    opacity: 0.6;
  }
  .danger-zone button:active { opacity: 1; }
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--purple);
    display: none;
  }
  .loading-overlay.show { display: flex; }
</style>
</head>
<body>

<div class="header">
  <h1>🙏 禱告卡片</h1>
  <div class="progress" id="progress">載入中...</div>
</div>

<div class="card">
  <textarea class="prayer-text" id="prayerText" placeholder="禱告事項內容..."></textarea>

  <div class="meta-row">
    <div class="meta-field cycle">
      <label>DG 週期</label>
      <select id="cycleSelect"></select>
    </div>
    <div class="meta-field tag">
      <label>標籤</label>
      <select id="tagSelect"></select>
    </div>
  </div>

  <div class="add-tag-row">
    <input type="text" id="newTagInput" placeholder="新增標籤...">
    <label class="add-tag-checkbox">
      <input type="checkbox" id="saveTagCheckbox" checked>
      <span>加入清單</span>
    </label>
    <button id="addTagBtn">套用</button>
  </div>

  <button class="copy-tasks-btn" id="copyToTasksBtn">📋 複製到 Google Tasks 預設清單</button>

  <div class="note" id="noteText"></div>
</div>

<div class="controls triple">
  <button class="btn secondary" id="prevBtn">◀ 上一項</button>
  <button class="btn" id="nextBtn">下一項 ▶</button>
  <button class="btn complete" id="completeBtn">✅ 完成</button>
</div>

<div class="controls">
  <button class="btn secondary" id="randomBtn">🎲 隨機一項</button>
  <button class="btn" id="speakBtn" style="background: var(--purple);">🔊 開始連禱</button>
</div>

<div class="toggle-row">
  <label class="switch">
    <input type="checkbox" id="pureReadToggle" checked>
    <span class="slider"></span>
  </label>
  <span>純朗讀模式（不標記完成）</span>
</div>

<div class="jump-row">
  <input type="number" id="jumpInput" placeholder="第幾項" min="1">
  <button id="jumpBtn">跳到</button>
</div>

<div class="status" id="status"></div>

<div class="danger-zone">
  <button id="deleteBtn">🗑 刪除此項</button>
</div>

<div class="loading-overlay" id="loadingOverlay">處理中...</div>

<script>
// ⚠️ 部署 Apps Script 網頁應用程式後，把網址貼在這裡
const API_URL = 'https://script.google.com/macros/s/AKfycbyaeqMjoNHYhTSMeu6uTCHipau8egCa72-SOWIARZJ-85GE82Bc0Audu62lQS8IEgxmyw/exec';

const CYCLE_MAP = {
  'D': 'D每天', '2': '2每兩天', '3': '3每三天', 'W': 'W每週', 'DW': 'DW每兩週',
  'M': 'M每月', '2M': '2M每兩個月', 'S': 'S每季', 'HY': 'HY每半年', 'Y': 'Y每年'
};
const TAG_MAP = { 'G': 'G工作日', 'W': 'W週末', 'F': 'F家庭會議', 'A': 'A安祺禱告' };

// ===== 本地暫存區：一次抓好今天的清單，之後翻頁/隨機/跳項都用這份資料，不用再打API =====
let itemsCache = [];   // [{row, text, cycle, note, tag}, ...]
let cachePos = 0;      // 目前指到 itemsCache 的第幾個（0-based）
let saveTimer = null;

const el = {
  progress: document.getElementById('progress'),
  prayerText: document.getElementById('prayerText'),
  cycleSelect: document.getElementById('cycleSelect'),
  tagSelect: document.getElementById('tagSelect'),
  newTagInput: document.getElementById('newTagInput'),
  saveTagCheckbox: document.getElementById('saveTagCheckbox'),
  addTagBtn: document.getElementById('addTagBtn'),
  copyToTasksBtn: document.getElementById('copyToTasksBtn'),
  noteText: document.getElementById('noteText'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  completeBtn: document.getElementById('completeBtn'),
  randomBtn: document.getElementById('randomBtn'),
  speakBtn: document.getElementById('speakBtn'),
  jumpInput: document.getElementById('jumpInput'),
  jumpBtn: document.getElementById('jumpBtn'),
  deleteBtn: document.getElementById('deleteBtn'),
  pureReadToggle: document.getElementById('pureReadToggle'),
  status: document.getElementById('status'),
  loadingOverlay: document.getElementById('loadingOverlay')
};

function populateSelect(selectEl, map, placeholder) {
  selectEl.innerHTML = '<option value="">' + placeholder + '</option>';
  Object.values(map).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    selectEl.appendChild(opt);
  });
}

// ===== 自訂標籤（永久存在 Google Sheet 後端，所有裝置共用，重新部署網頁也不會消失） =====
let customTagsCache = []; // 從伺服器抓回來的自訂標籤清單，快取在記憶體裡

// 開啟頁面時向伺服器抓一次目前完整的標籤清單
async function loadTagList() {
  try {
    const data = await apiCall({ action: 'getTagList' });
    customTagsCache = data.custom || [];
  } catch (err) {
    showStatus('讀取標籤清單失敗：' + err.message);
    customTagsCache = [];
  }
}

// 把內建標籤（TAG_MAP）跟自訂標籤（伺服器抓回來的）合併，一起顯示在下拉選單
function populateTagSelect() {
  el.tagSelect.innerHTML = '<option value="">選擇標籤</option>';

  Object.values(TAG_MAP).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    el.tagSelect.appendChild(opt);
  });

  customTagsCache.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v + '（自訂）';
    el.tagSelect.appendChild(opt);
  });
}

function setLoading(show) {
  el.loadingOverlay.classList.toggle('show', show);
}

function showStatus(msg) {
  el.status.textContent = msg;
  setTimeout(() => { el.status.textContent = ''; }, 1800);
}

// 加上時間戳記參數 + cache: 'no-store'，避免瀏覽器用舊的快取回應，
// 這是造成「完成很多項後，重新整理網頁數字沒有正確減少」的根本原因。
async function apiCall(params) {
  params._t = Date.now(); // 加時間戳記，讓每次網址都不一樣，繞過快取
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, { cache: 'no-store' }); // 明確告訴瀏覽器不要用快取
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// 從本地暫存區渲染畫面（不打API，瞬間完成）
function renderFromCache(pos) {
  if (itemsCache.length === 0) {
    renderEmptyState();
    return;
  }
  cachePos = ((pos % itemsCache.length) + itemsCache.length) % itemsCache.length;
  const item = itemsCache[cachePos];

  el.progress.textContent = `第 ${cachePos + 1} 項 / 共 ${itemsCache.length} 項`;
  el.prayerText.value = item.text || '';
  el.cycleSelect.value = item.cycle || '';
  el.tagSelect.value = item.tag || '';
  el.noteText.textContent = item.note ? ('備註：' + item.note) : '';
}

function renderEmptyState() {
  el.progress.textContent = '第 0 項 / 共 0 項';
  el.prayerText.value = '🎉 今天沒有需要禱告的事項';
  el.cycleSelect.value = '';
  el.tagSelect.value = '';
  el.noteText.textContent = '';
}

// 初始載入：一次抓好整份今日待辦清單
async function loadAllItems() {
  setLoading(true);
  try {
    const data = await apiCall({ action: 'getAllItems' });
    itemsCache = data.items || [];
    cachePos = 0;
    renderFromCache(0);
  } catch (err) {
    showStatus('載入失敗：' + err.message);
  } finally {
    setLoading(false);
  }
}

async function init() {
  populateSelect(el.cycleSelect, CYCLE_MAP, '選擇週期');
  await loadTagList();
  populateTagSelect();
  await loadAllItems();
}

el.addTagBtn.addEventListener('click', async () => {
  if (itemsCache.length === 0) return;

  const newTag = el.newTagInput.value.trim();
  if (!newTag) { showStatus('請輸入標籤內容'); return; }

  const item = itemsCache[cachePos];
  item.tag = newTag;
  el.tagSelect.value = ''; // 自訂值不一定在下拉選單裡，先清空避免顯示錯亂
  const rowRef = item.row;

  // 套用到目前這項，背景同步（不阻塞畫面）
  apiCall({ action: 'updateTagByRow', row: rowRef, value: newTag })
    .then(data => {
      if (data && data.exported) {
        showStatus('已複製到對應 Google Tasks 清單');
      } else if (data && data.copied) {
        showStatus('標籤已套用並複製到 Google Tasks');
      } else {
        showStatus('標籤已套用');
      }
    })
    .catch(err => showStatus('套用失敗：' + err.message));

  // 打勾才永久收錄進標籤清單（存到 Google Sheet 後端，所有裝置共用）
  if (el.saveTagCheckbox.checked) {
    try {
      const data = await apiCall({ action: 'addCustomTag', value: newTag });
      customTagsCache = data.custom || [];
      populateTagSelect();
      el.tagSelect.value = newTag;
    } catch (err) {
      showStatus('加入清單失敗：' + err.message);
    }
  }

  el.newTagInput.value = '';
});

// 不管H欄標籤目前是什麼值，都直接複製目前這項到 Google Tasks 預設清單。
// 用來解決「標籤本來就已經是task預設清單、change事件不會觸發」的限制，可以隨時重複按。
el.copyToTasksBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) return;
  const item = itemsCache[cachePos];

  apiCall({ action: 'copyToTasks', row: item.row })
    .then(data => {
      if (data && data.copied) {
        showStatus('已複製到 Google Tasks 預設清單');
      } else {
        showStatus('複製失敗，請稍後再試');
      }
    })
    .catch(err => showStatus('複製失敗：' + err.message));
});

// ===== 翻頁：純本地操作，不打API，瞬間完成 =====
el.prevBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) return;
  stopSpeakingIfNeeded();
  renderFromCache(cachePos - 1);
});

el.randomBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) return;
  stopSpeakingIfNeeded();
  renderFromCache(Math.floor(Math.random() * itemsCache.length));
});

el.jumpBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) { showStatus('目前沒有待禱告的項目'); return; }
  const val = parseInt(el.jumpInput.value, 10);
  if (!val || val < 1) { showStatus('請輸入有效項次'); return; }
  renderFromCache(val - 1);
  el.jumpInput.value = '';
});

// 「下一項」= 純翻頁，不標記完成、不動F/E欄、不從清單移除
el.nextBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) return;
  stopSpeakingIfNeeded();
  renderFromCache(cachePos + 1);
});

// 「完成」= 標記目前這項完成：本地立刻移除、畫面瞬間更新，API在背景默默同步，不卡畫面
el.completeBtn.addEventListener('click', () => {
  if (itemsCache.length === 0) return;
  stopSpeakingIfNeeded();

  const item = itemsCache[cachePos];
  itemsCache.splice(cachePos, 1);

  if (itemsCache.length === 0) {
    renderEmptyState();
  } else {
    renderFromCache(cachePos); // 移除後原位置自然遞補成下一項
  }

  apiCall({ action: 'completeByRow', row: item.row }).catch(err => {
    showStatus('同步失敗，請檢查網路：' + err.message);
  });
});

// 刪除：需要等API確認成功（避免列號校正錯誤），但只有這個動作會等待
el.deleteBtn.addEventListener('click', async () => {
  if (itemsCache.length === 0) return;
  const item = itemsCache[cachePos];
  const preview = (item.text || '').slice(0, 20);
  const confirmed = window.confirm(
    '確定要刪除這一項嗎？\n\n「' + preview + ((item.text || '').length > 20 ? '...' : '') + '」\n\n這個動作無法復原。'
  );
  if (!confirmed) return;

  stopSpeakingIfNeeded();
  setLoading(true);
  try {
    await apiCall({ action: 'deleteByRow', row: item.row });

    const deletedRow = item.row;
    itemsCache.splice(cachePos, 1);
    // 刪除後，伺服器上這一列之後的列號都會往前移一位，本地暫存區同步校正，避免後續操作對錯列
    itemsCache.forEach(it => { if (it.row > deletedRow) it.row -= 1; });

    if (itemsCache.length === 0) {
      renderEmptyState();
    } else {
      renderFromCache(cachePos);
    }
    showStatus('已刪除');
  } catch (err) {
    showStatus('刪除失敗：' + err.message);
  } finally {
    setLoading(false);
  }
});

// 事項文字編輯 → 本地暫存同步更新 + 背景同步API（打字後停頓1秒才送出）
el.prayerText.addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (itemsCache.length === 0) return;
    const item = itemsCache[cachePos];
    item.text = el.prayerText.value;
    apiCall({ action: 'updateTextByRow', row: item.row, value: item.text })
      .then(() => showStatus('已同步'))
      .catch(err => showStatus('同步失敗：' + err.message));
  }, 1000);
});

el.cycleSelect.addEventListener('change', () => {
  if (!el.cycleSelect.value || itemsCache.length === 0) return;
  const item = itemsCache[cachePos];
  item.cycle = el.cycleSelect.value;
  apiCall({ action: 'updateCycleByRow', row: item.row, value: item.cycle })
    .then(() => showStatus('週期已更新'))
    .catch(err => showStatus('更新失敗：' + err.message));
});

el.tagSelect.addEventListener('change', () => {
  if (!el.tagSelect.value || itemsCache.length === 0) return;
  const item = itemsCache[cachePos];
  item.tag = el.tagSelect.value;
  const rowRef = item.row;
  apiCall({ action: 'updateTagByRow', row: rowRef, value: item.tag })
    .then(data => {
      if (data && data.exported) {
        showStatus('已複製到對應 Google Tasks 清單');
      } else if (data && data.copied) {
        showStatus('標籤已更新並複製到 Google Tasks');
      } else {
        showStatus('標籤已更新');
      }
    })
    .catch(err => showStatus('更新失敗：' + err.message));
});

// ===== 朗讀（連禱）功能：翻頁改成純本地操作，只有標記完成在背景打API，速度不受網路影響 =====
const REPEATS_PER_ITEM = 3;
let autoPrayActive = false;
let pureReadMode = true; // 純朗讀模式：預設開啟，開啟時連禱不會標記完成、不寫入F欄、不從清單移除
let zhVoice = null;

el.pureReadToggle.addEventListener('change', (e) => {
  pureReadMode = e.target.checked;
});

function loadVoices() {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  zhVoice = voices.find(v => v.lang === 'zh-TW')
        || voices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh'))
        || null;
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speakOnePass(text) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis || !text || !text.trim()) {
      resolve();
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-TW';
    if (zhVoice) utter.voice = zhVoice;
    utter.rate = 0.95;
    utter.pitch = 1;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    window.speechSynthesis.speak(utter);
  });
}

async function runAutoPray() {
  try {
    const isPureMode = pureReadMode; // 記錄本次連禱開始時的模式，開始後中途切換不影響這次執行
    const totalAtStart = itemsCache.length;
    let loopCount = 0;

    while (autoPrayActive) {
      if (itemsCache.length === 0) {
        autoPrayActive = false;
        el.speakBtn.textContent = '🔊 開始連禱';
        showStatus('今天的禱告事項都完成了 🙏');
        return;
      }

      for (let i = 0; i < REPEATS_PER_ITEM; i++) {
        if (!autoPrayActive) return;
        el.speakBtn.textContent = `⏹ 停止連禱（${i + 1}/${REPEATS_PER_ITEM}）`;
        await speakOnePass(el.prayerText.value);
      }
      if (!autoPrayActive) return;

      if (isPureMode) {
        // 純朗讀模式：不打API、不標記完成、不從清單移除，單純往下一項移動
        loopCount++;
        if (loopCount >= totalAtStart) {
          autoPrayActive = false;
          el.speakBtn.textContent = '🔊 開始連禱';
          showStatus('本輪已唸完一遍（未標記完成）🙏');
          return;
        }
        renderFromCache(cachePos + 1);
        continue;
      }

      const item = itemsCache[cachePos];
      itemsCache.splice(cachePos, 1);

      apiCall({ action: 'completeByRow', row: item.row }).catch(err => {
        showStatus('同步失敗：' + err.message);
      });

      if (itemsCache.length === 0) {
        autoPrayActive = false;
        el.speakBtn.textContent = '🔊 開始連禱';
        showStatus('今天的禱告事項都完成了 🙏');
        renderEmptyState();
        return;
      }

      renderFromCache(cachePos);
    }
  } finally {
    // 不管連禱從哪個路徑結束（正常唸完、被停止、發生錯誤），都確保釋放螢幕喚醒鎖
    releaseWakeLock();
  }
}

// ===== 螢幕保持喚醒（避免連禱途中因為太久沒碰螢幕而自動熄屏鎖定中斷）=====
// 注意：這只能防止「自動熄屏」，如果手動按電源鍵鎖屏，系統仍會強制中斷背景分頁的執行，這是手機系統層級的限制。
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (err) {
    // 裝置不支援或無法取得，不影響其他功能，只是連禱途中螢幕可能還是會自動熄屏
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try { await wakeLock.release(); } catch (err) { /* 忽略 */ }
    wakeLock = null;
  }
}

// 分頁切回前景時，如果連禱還在進行中，嘗試重新取得喚醒鎖（有些瀏覽器切背景時會自動釋放）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && autoPrayActive && !wakeLock) {
    requestWakeLock();
  }
});

el.speakBtn.addEventListener('click', () => {
  if (autoPrayActive) {
    autoPrayActive = false;
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    el.speakBtn.textContent = '🔊 開始連禱';
    releaseWakeLock();
    return;
  }
  autoPrayActive = true;
  requestWakeLock();
  runAutoPray();
});

function stopSpeakingIfNeeded() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (autoPrayActive) {
    autoPrayActive = false;
    el.speakBtn.textContent = '🔊 開始連禱';
    releaseWakeLock();
  }
}

init();
</script>
